<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class=" bg-[#1E1E1E] ">
    <section class="min-h-screen max-w-md bg-gray-200 mx-auto  ">
        <header>
        <nav class="flex items-center justify-center ">
            <div class="mt-10 flex flex-col justify-center items-center relative w-3/5">
                <img class="" src="assets/bg.png" alt="">
                <img class="w-4/12 absolute " src="assets/Group.png" alt="">
            </div>
        </nav>
    </header>

    
  <div class="hero-content flex-col lg:flex-row-reverse mt-0 pt-0">
    
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <form class="card-body">
        <fieldset class="fieldset">
          <label class="label">Account Number</label>
          <input value="123456789" id="acNum" type="Account Number" class="input rounded-3xl" placeholder="Enter your Number" required/>
          <label class="label ">4 DIGIT PIN</label>
          <input value="1234" id="pin" type="PIN" class="input rounded-3xl" placeholder="Enter 4 DIGIT PIN" required />
          <button id="login-btn" class="btn btn-neutral bg-sky-600 rounded-3xl border-none mt-4">Login</button>
        </fieldset>
      </form>
    </div>
  </div>
</div>
    </section>

    <script src="script/login.js"></script>
</body>
</html>
