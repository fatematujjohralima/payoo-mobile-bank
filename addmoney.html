<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class=" bg-[#1E1E1E]">
    <section class="min-h-screen max-w-md bg-gray-200 mx-auto px-6 ">
        <header>
            <nav class="flex justify-between items-center  py-11 ">
                <div class="flex justify-around items-center">
                    <img class="w-12 h-12" src="assets/Group.png" alt="">
                    <div class="">
                        <h1 class="text-3xl font-bold">$ <span id="main-balance">4500</span></h1>
                        <p class="text-gray-500">Available Balance</p>
                    </div>
                </div>
                <button class="btn">Logout</button>
            </nav>

            <div class="border-b border-gray-300 "></div>
            
            <section>
                <h1 class="text-2xl font-bold mb-2">🔥 Welcome to Payooo!</h1>
                <p>Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

                <div class="boxs grid grid-cols-3 mt-14 gap-2 ">
                    <div id="addMoney" class="box cursor-pointer border p-4 text-center rounded-sm">
                        <img class="w-8 mx-auto" src="assets/wallet1.png" alt="">
                        <h3>Add Money</h3>
                    </div>
                    <div id="cashout" class="box border p-4 text-center rounded-sm">
                        <img class="w-8 mx-auto" src="assets/send1.png" alt="">
                        <h3>CashOut</h3>
                    </div>
                    <div class="box border p-4 text-center rounded-sm">
                        <img class="w-8 mx-auto" src="assets/money1.png" alt="">
                        <h3>Transfer Money</h3>
                    </div>
                    <div class="box border p-4 text-center rounded-sm">
                        <img class="w-8 mx-auto" src="assets/bonus1.png" alt="">
                        <h3>Get Bonus</h3>
                    </div>
                    <div class="box border p-4 text-center rounded-sm">
                        <img class="w-8 mx-auto" src="assets/purse1.png" alt="">
                        <h3>Pay Bill</h3>
                    </div>
                    <div class="box border p-4 text-center rounded-sm">
                        <img class="w-8 mx-auto" src="assets/transaction1.png" alt="">
                        <h3>Transactions</h3>
                    </div>
                </div>
            </section>

            <section id="addmoney-section" class="pt-8 pb-4">
                <h2 class="font-semibold text-xl">Add Money</h2>

                <div class="">
  <div class="hero-content flex-col lg:flex-row-reverse">
    
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">
        <!-- <label class="label font-medium text-black">Select A Bank</label> -->
        <fieldset class="fieldset">
  <legend class="fieldset-legend ">Select A Bank</legend>
  <select class="select rounded-3xl bg-slate-200">
    <option disabled selected>Select Bank</option>
    <option value="Bkash">Bkash</option>
    <option value="Nagad">Nagad</option>
    <option value="DBBL">DBBL</option>
  </select>
 
</fieldset>
        <fieldset class="fieldset">
          <label class="label font-medium text-black">Bank Account Number</label>
          <input type="number" class="input bg-slate-200 rounded-3xl" placeholder="Enter 11 digit account number" />
          <label class="label font-medium text-black">Amount to Add</label>
          <input id="amount" type="number" class="input bg-slate-200 rounded-3xl" placeholder="Add Amount to withdraw" />
          <label class="label font-medium text-black">Pin Number</label>
          <input type="password" class="input rounded-3xl bg-slate-200 " placeholder="Enter 4 digit pin number" />
          
          <button id="btn-addmoney" class="btn border-none btn-neutral bg-blue-700 mt-4 rounded-3xl">Add Money</button>
        </fieldset>
      </div>
    </div>
  </div>
</div>
            </section>



            <section id="cashout-section" class="pt-8 pb-4">
                <h2 class="font-semibold text-xl">CashOut</h2>

                <div class="">
  <div class="hero-content flex-col lg:flex-row-reverse">
    
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">
        <!-- <label class="label font-medium text-black">Select A Bank</label> -->
        
        <fieldset class="fieldset">
          <label class="label font-medium text-black">Bank Account Number</label>
          <input type="number" class="input bg-slate-200 rounded-3xl" placeholder="Enter 11 digit account number" />
          <label class="label font-medium text-black">Amount</label>
          <input id="amount-cashout" type="number" class="input bg-slate-200 rounded-3xl" placeholder="Enter amount to withdraw" />
          <label class="label font-medium text-black">Pin Number</label>
          <input type="password" class="input rounded-3xl bg-slate-200 " placeholder="Enter 4 digit pin number" />
          
          <button id="btn-addmoney" class="btn border-none btn-neutral bg-blue-700 mt-4 rounded-3xl">Withdraw Money</button>
        </fieldset>
      </div>
    </div>
  </div>
</div>
            </section>

        </header>
    </section>
    
<script src="/script/addmoney.js"></script>
<script src="/script/toggle.js"></script>
</body>
</html>
